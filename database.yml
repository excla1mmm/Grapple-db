- action: aquasecurity/trivy-action
  date: "2026-03-15"
  severity: critical
  title: "Supply chain attack: 75 tags overwritten with malicious code"
  affected_repos_estimate: 2300
  description: |
    Attackers gained write access to the aquasecurity/trivy-action repository
    and overwrote 75 tags, replacing them with commits containing code that
    exfiltrated CI secrets (tokens, environment variables) to an external
    server. Any workflow referencing this action by tag (e.g. @v0.20.0) instead
    of a full commit SHA executed the malicious code.
  affected_refs:
    - type: all_tags_before
      date: "2026-03-15"
  references:
    - https://github.com/aquasecurity/trivy-action/security/advisories/GHSA-hgjh-9rj2-g67j

- action: reviewdog/action-setup
  date: "2025-03-19"
  severity: high
  cve: CVE-2025-30154
  title: "Malicious code added to reviewdog/action-setup@v1 during a supply chain attack"
  description: |
    GitHub's advisory states that reviewdog/action-setup@v1 was compromised
    on March 11, 2025 between 18:42 and 20:31 UTC. Malicious code was added
    that dumped exposed secrets to GitHub Actions workflow logs. This attack
    also impacted other reviewdog actions that depended on action-setup@v1.
  affected_refs:
    - type: tag
      value: v1
  references:
    - https://github.com/advisories/GHSA-qmg3-hpqr-gqvc
    - https://github.com/reviewdog/reviewdog/issues/2079

- action: reviewdog/action-shellcheck
  date: "2025-03-18"
  severity: critical
  title: "Supply chain compromise via transitive dependency on reviewdog/action-setup"
  description: |
    The reviewdog maintainer disclosed that versions of reviewdog/action-shellcheck
    below v1.29.2 were affected by the March 11, 2025 supply chain attack because
    they depended on reviewdog/action-setup@v1 while that tag pointed to malicious
    code. As a result, workflows using these versions could leak secrets through
    GitHub Actions workflow logs during the compromise window.
  affected_refs:
    - type: tag
      value: "<v1.29.2"
  references:
    - https://github.com/reviewdog/reviewdog/issues/2079
    - https://github.com/advisories/GHSA-qmg3-hpqr-gqvc

